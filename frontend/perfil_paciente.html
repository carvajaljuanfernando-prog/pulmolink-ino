<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulmoLink — Perfil del Paciente</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--teal:#006B8F;--teal-dk:#00425A;--teal-lt:#00A3C4;--teal-pale:#E0F5FB;--warm:#F2F7FA;--white:#FFFFFF;--text-1:#0A2330;--text-2:#3A5566;--text-3:#7A9AAA;--red:#D63E3E;--red-lt:#FDF0F0;--amber:#C07A00;--amber-lt:#FEF5E4;--green:#1A7A4A;--green-lt:#E8F7EF;--purple:#5B3FAA;--purple-lt:#EDE8FE;--border:rgba(0,107,143,0.12);--shadow:0 2px 12px rgba(0,66,90,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito",sans-serif;background:var(--warm);color:var(--text-1);min-height:100vh}
.topbar{background:var(--teal-dk);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.btn-back{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 14px;color:white;font-family:"Nunito",sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.topbar-title{font-size:16px;font-weight:700;color:white}
.container{max-width:1100px;margin:0 auto;padding:24px 20px}
.pac-box{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:24px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.pac-select{flex:1;min-width:220px;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:"Nunito",sans-serif;font-size:14px;color:var(--text-1);background:var(--white);outline:none;cursor:pointer}
/* Hero banner */
.hero{background:linear-gradient(135deg,var(--teal-dk) 0%,var(--teal) 60%,var(--teal-lt) 100%);border-radius:18px;padding:28px 32px;margin-bottom:20px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.hero-avatar{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.2);border:3px solid rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:white;flex-shrink:0}
.hero-info{flex:1}
.hero-nombre{font-size:24px;font-weight:800;color:white;margin-bottom:4px}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.75)}
.hero-badges{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.hbadge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid rgba(255,255,255,0.3);color:white}
.hbadge.rojo{background:rgba(214,62,62,0.4)}
.hbadge.amber{background:rgba(192,122,0,0.4)}
.hbadge.verde{background:rgba(26,122,74,0.4)}
.hbadge.gris{background:rgba(255,255,255,0.15)}
/* Grid layout */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:700px){.grid-2,.grid-3{grid-template-columns:1fr}}
/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.data-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid rgba(0,107,143,0.06)}
.data-row:last-child{border-bottom:none}
.data-label{font-size:12px;color:var(--text-3)}
.data-val{font-size:13px;font-weight:700;color:var(--text-1);text-align:right}
/* Stat boxes */
.stat-box{background:var(--warm);border-radius:10px;padding:12px 14px;text-align:center}
.stat-num{font-size:28px;font-weight:800;color:var(--teal-dk)}
.stat-label{font-size:11px;color:var(--text-3);margin-top:2px}
.stat-sub{font-size:10px;color:var(--text-3)}
/* Riesgo semáforo */
.riesgo-bajo{color:var(--green)!important}
.riesgo-intermedio{color:var(--amber)!important}
.riesgo-alto{color:var(--red)!important}
/* Examen resumen */
.exam-item{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;background:var(--warm)}
.exam-tipo{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.5px}
.exam-fecha{font-size:11px;color:var(--text-3)}
.exam-vals{font-size:13px;color:var(--text-2);margin-top:4px}
/* Alerta item */
.alerta-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:6px}
.alerta-critica{background:var(--red-lt);border:1px solid rgba(214,62,62,0.2)}
.alerta-alta{background:var(--amber-lt);border:1px solid rgba(192,122,0,0.2)}
.alerta-media{background:var(--teal-pale);border:1px solid var(--border)}
/* Progress bar */
.prog-bar{height:8px;background:rgba(0,107,143,0.1);border-radius:4px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;background:var(--teal);border-radius:4px;transition:width 0.5s}
/* Empty state */
.empty{font-size:12px;color:var(--text-3);text-align:center;padding:16px}
.spinner-cont{text-align:center;padding:40px;color:var(--text-3);font-size:13px}
</style>
</head>
<body>

<div class="topbar">
  <button class="btn-back" onclick="window.location.href='/dashboard-profesional'">← Dashboard</button>
  <div class="topbar-title">👤 Perfil Integral del Paciente</div>
</div>

<div class="container">

  <div class="pac-box">
    <span style="font-size:12px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.6px">Paciente</span>
    <select class="pac-select" id="pac-select" onchange="cargarPerfil()">
      <option value="">Selecciona un paciente...</option>
    </select>
  </div>

  <div id="perfil-content">
    <div class="spinner-cont">Selecciona un paciente para ver su perfil integral.</div>
  </div>

</div>

<script src="/paciente-search.js"></script>
<script>
const API   = 'https://pulmolink-ino-production.up.railway.app';
const token = localStorage.getItem('pulmolink_token');
if (!token) window.location.href = '/login';

let pacientes = [], pac = null;

window.addEventListener('DOMContentLoaded', async () => {
  try {
    const r = await fetch(`${API}/api/v1/examenes/pacientes-lista`, { headers:{ Authorization:`Bearer ${token}` } });
    if (r.status === 401) { window.location.href = '/login'; return; }
    const d = await r.json();
    pacientes = d.pacientes || [];
    const sel = document.getElementById('pac-select');
    pacientes.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id; opt.textContent = `${p.nombre} ${p.apellido}`;
      sel.appendChild(opt);
    });
  } catch(e) { console.error(e); }
});

async function cargarPerfil() {
  const id = document.getElementById('pac-select').value;
  if (!id) return;
  pac = pacientes.find(p => p.id === id);
  if (!pac) return;
  document.getElementById('perfil-content').innerHTML = '<div class="spinner-cont">⏳ Cargando perfil completo...</div>';
  try {
    const [rExam, rEval, rEst, rRehab, rAlertas, rFarma, rContacto] = await Promise.all([
      fetch(`${API}/api/v1/examenes/${id}`, { headers:{ Authorization:`Bearer ${token}` } }),
      fetch(`${API}/api/v1/evaluaciones/paciente/${id}`, { headers:{ Authorization:`Bearer ${token}` } }),
      fetch(`${API}/api/v1/examenes/estratificacion/${id}`, { headers:{ Authorization:`Bearer ${token}` } }),
      fetch(`${API}/api/v1/rehabilitacion/sesiones/${id}`, { headers:{ Authorization:`Bearer ${token}` } }),
      fetch(`${API}/api/v1/alertas?limite=5`, { headers:{ Authorization:`Bearer ${token}` } }),
      fetch(`${API}/api/v1/farmacia/historial/${id}`, { headers:{ Authorization:`Bearer ${token}` } }),
      fetch(`${API}/api/v1/contacto-enfermeria/${id}`, { headers:{ Authorization:`Bearer ${token}` } }),
    ]);
    const dExam    = rExam.ok    ? await rExam.json()    : {};
    const dEval    = rEval.ok    ? await rEval.json()    : {};
    const dEst     = rEst.ok     ? await rEst.json()     : {};
    const dRehab   = rRehab.ok   ? await rRehab.json()   : {};
    const dAlertas = rAlertas.ok ? await rAlertas.json() : {};
    const dFarma   = rFarma.ok   ? await rFarma.json()   : {};
    const dContacto= rContacto.ok? await rContacto.json(): {};

    renderPerfil(dExam, dEval, dEst, dRehab, dAlertas, dFarma, dContacto);
  } catch(e) {
    console.error(e);
    document.getElementById('perfil-content').innerHTML = '<div class="spinner-cont">Error al cargar el perfil.</div>';
  }
}

function renderPerfil(dExam, dEval, dEst, dRehab, dAlertas, dFarma, dContacto) {
  const examenes     = dExam.examenes || [];
  const evals        = dEval.evaluaciones || [];
  const estratifs    = dEst.estratificaciones || [];
  const alertas      = (dAlertas.alertas || []).filter(a => a.paciente_nombre === pac.nombre+' '+pac.apellido || true).slice(0,5);
  const sesiones     = dRehab.sesiones || [];
  const contactos    = dContacto.contactos || [];
  const medicamentos = dFarma.medicamentos || dFarma.perfil || [];

  // Últimos exámenes
  const ecos = examenes.filter(e => e.tipo === 'ecocardiograma');
  const cats = examenes.filter(e => e.tipo === 'cateterismo_derecho');
  const lastEco = ecos[0];
  const lastCat = cats[0];

  // Calidad de vida
  const sf12s    = evals.filter(e => e.tipo === 'sf12').slice(0,3);
  const moriskys = evals.filter(e => e.tipo === 'morisky8').slice(0,3);
  const lastSF   = sf12s[0];
  const lastMor  = moriskys[0];

  // Última estratificación
  const lastEst = estratifs[0];

  // Rehabilitación
  const sesComp = sesiones.length;
  const sesTot  = dRehab.sesiones_programadas?.total || 48;
  const lastSes = sesiones[0];
  const lastTc6m = sesiones.filter(s=>s.tc6m_metros).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha))[0];

  // Datos básicos
  const ini  = ((pac.nombre||'')[0]||'') + ((pac.apellido||'')[0]||'');
  const edad = pac.fecha_nacimiento ? Math.floor((Date.now()-new Date(pac.fecha_nacimiento))/(365.25*24*60*60*1000)) : '--';
  const cf   = pac.clase_funcional_oms ? ['I','II','III','IV'][pac.clase_funcional_oms-1] : '--';
  const riesgo = pac.clasificacion_riesgo || '--';
  const rCol = {bajo:'verde', intermedio:'amber', alto:'rojo'}[riesgo] || 'gris';
  const fechaIng = pac.fecha_ingreso_programa ? new Date(pac.fecha_ingreso_programa).toLocaleDateString('es-CO') : '--';

  document.getElementById('perfil-content').innerHTML = `

    <!-- HERO -->
    <div class="hero">
      <div class="hero-avatar">${ini.toUpperCase()}</div>
      <div class="hero-info">
        <div class="hero-nombre">${pac.nombre} ${pac.apellido}</div>
        <div class="hero-sub">${pac.tipo_documento||'CC'} ${pac.numero_documento||'--'} · ${edad} años · ${pac.sexo==='M'?'Masculino':pac.sexo==='F'?'Femenino':pac.sexo||'--'}</div>
        <div class="hero-badges">
          <span class="hbadge gris">Grupo HP ${pac.grupo_hp_oms||'--'}</span>
          <span class="hbadge gris">CF-OMS ${cf}</span>
          <span class="hbadge ${rCol}">Riesgo ${riesgo.toUpperCase()}</span>
          <span class="hbadge gris">${pac.eps||'Sin EPS'}</span>
          ${pac.diagnostico_hp ? `<span class="hbadge gris">${pac.diagnostico_hp}</span>` : ''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
        <div style="font-size:11px;color:rgba(255,255,255,0.6)">En programa desde</div>
        <div style="font-size:16px;font-weight:800;color:white">${fechaIng}</div>
      </div>
    </div>

    <!-- FILA 1: Identificación + Administrativos + Clínicos -->
    <div class="grid-3" style="margin-bottom:16px">

      <div class="card">
        <div class="card-title">👤 Identificación</div>
        ${dataRow('Nombre completo', pac.nombre+' '+pac.apellido)}
        ${dataRow('Documento', (pac.tipo_documento||'CC')+' '+( pac.numero_documento||'--'))}
        ${dataRow('Fecha nacimiento', pac.fecha_nacimiento ? new Date(pac.fecha_nacimiento).toLocaleDateString('es-CO') : '--')}
        ${dataRow('Edad', edad+' años')}
        ${dataRow('Sexo', pac.sexo==='M'?'Masculino':pac.sexo==='F'?'Femenino':pac.sexo||'--')}
        ${dataRow('Teléfono', pac.telefono||'--')}
        ${dataRow('Ciudad', pac.ciudad||'--')}
      </div>

      <div class="card">
        <div class="card-title">🏥 Administrativos</div>
        ${dataRow('EPS / Asegurador', pac.eps||'--')}
        ${dataRow('Régimen', pac.regimen||'--')}
        ${dataRow('Ingreso al programa', fechaIng)}
        ${dataRow('Médico tratante', pac.medico_tratante||'--')}
        ${dataRow('Sede', pac.sede||'Principal')}
        ${dataRow('Estado', pac.activo!==false?'Activo':'Egresado')}
      </div>

      <div class="card">
        <div class="card-title">🫀 Datos clínicos</div>
        ${dataRow('Diagnóstico HP', pac.diagnostico_hp||'--')}
        ${dataRow('Grupo HP (OMS)', pac.grupo_hp_oms ? 'Grupo '+pac.grupo_hp_oms : '--')}
        ${dataRow('Clase funcional OMS', 'CF-OMS '+cf)}
        ${dataRow('Riesgo ESC/ERS', riesgo.charAt(0).toUpperCase()+riesgo.slice(1))}
        ${lastEst ? dataRow('Última estratificación', new Date(lastEst.created_at).toLocaleDateString('es-CO')) : ''}
        ${lastEst ? dataRow('Calculadora usada', lastEst.tipo_calculadora?.replace('_',' ').toUpperCase()||'--') : ''}
      </div>

    </div>

    <!-- FILA 2: Últimos exámenes -->
    <div class="grid-2" style="margin-bottom:16px">

      <div class="card">
        <div class="card-title">🔬 Últimos exámenes diagnósticos</div>
        ${lastEco ? `
          <div class="exam-item">
            <div style="display:flex;justify-content:space-between">
              <span class="exam-tipo">🫀 Ecocardiograma</span>
              <span class="exam-fecha">${fechaCorta(lastEco.fecha_examen||lastEco.created_at)}</span>
            </div>
            <div class="exam-vals">
              ${lastEco.datos?.fevi_pct!=null?`FEVI ${lastEco.datos.fevi_pct}%`:''} 
              ${lastEco.datos?.tapse!=null?` · TAPSE ${lastEco.datos.tapse}mm`:''} 
              ${lastEco.datos?.psap_eco!=null?` · PSAP ${lastEco.datos.psap_eco}mmHg`:''} 
              ${lastEco.datos?.vel_regurg_tricusp!=null?` · TRV ${lastEco.datos.vel_regurg_tricusp}m/s`:''}
              ${lastEco.datos?.probabilidad_hp_ase2025?` · HP ${lastEco.datos.probabilidad_hp_ase2025}`:''}
            </div>
          </div>` : '<div class="empty">Sin ecocardiograma registrado</div>'}
        ${lastCat ? `
          <div class="exam-item">
            <div style="display:flex;justify-content:space-between">
              <span class="exam-tipo">🔬 Cateterismo derecho</span>
              <span class="exam-fecha">${fechaCorta(lastCat.fecha_examen||lastCat.created_at)}</span>
            </div>
            <div class="exam-vals">
              ${lastCat.datos?.pmap!=null?`PMAP ${lastCat.datos.pmap}mmHg`:''}
              ${lastCat.datos?.pcap!=null?` · PCAP ${lastCat.datos.pcap}mmHg`:''}
              ${(lastCat.datos?.rvp_calculada||lastCat.datos?.rvp)!=null?` · RVP ${lastCat.datos.rvp_calculada||lastCat.datos.rvp} UW`:''}
              ${lastCat.datos?.gasto_cardiaco!=null?` · GC ${lastCat.datos.gasto_cardiaco}L/min`:''}
              ${lastCat.datos?.diagnostico_hemodinamico?`<br><span style="font-size:11px;color:var(--teal-dk)">${lastCat.datos.diagnostico_hemodinamico.split('—')[0]}</span>`:''}
            </div>
          </div>` : '<div class="empty">Sin cateterismo registrado</div>'}
      </div>

      <div class="card">
        <div class="card-title">📊 Historial de estratificaciones</div>
        ${estratifs.length ? estratifs.slice(0,4).map(e => {
          const col = {bajo:'var(--green)',intermedio:'var(--amber)',alto:'var(--red)'}[e.clasificacion_riesgo]||'var(--teal)';
          return `<div class="exam-item">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:11px;color:var(--text-3)">${fechaCorta(e.created_at)} · ${(e.tipo_calculadora||'').replace('_',' ').toUpperCase()}</span>
              <span style="font-size:12px;font-weight:800;color:${col}">${(e.clasificacion_riesgo||'--').toUpperCase()}</span>
            </div>
            ${e.tc6m!=null||e.nt_probnp!=null ? `<div style="font-size:11px;color:var(--text-3);margin-top:3px">${e.tc6m!=null?'TC6M '+e.tc6m+'m':''} ${e.nt_probnp!=null?' · NT-proBNP '+e.nt_probnp+' pg/mL':''}</div>` : ''}
          </div>`;
        }).join('') : '<div class="empty">Sin estratificaciones registradas</div>'}
      </div>

    </div>

    <!-- FILA 3: Calidad de vida + Rehabilitación -->
    <div class="grid-2" style="margin-bottom:16px">

      <div class="card">
        <div class="card-title">📋 Calidad de vida y adherencia</div>
        <div class="grid-2" style="gap:10px;margin-bottom:14px">
          <div class="stat-box">
            <div class="stat-num ${lastSF?.puntaje_pcs<40?'riesgo-alto':lastSF?.puntaje_pcs<50?'riesgo-intermedio':'riesgo-bajo'}">${lastSF?.puntaje_pcs?.toFixed(1)||'--'}</div>
            <div class="stat-label">SF-12 PCS (Físico)</div>
            <div class="stat-sub">Normal ≥ 50</div>
          </div>
          <div class="stat-box">
            <div class="stat-num ${lastSF?.puntaje_mcs<40?'riesgo-alto':lastSF?.puntaje_mcs<50?'riesgo-intermedio':'riesgo-bajo'}">${lastSF?.puntaje_mcs?.toFixed(1)||'--'}</div>
            <div class="stat-label">SF-12 MCS (Mental)</div>
            <div class="stat-sub">Normal ≥ 50</div>
          </div>
        </div>
        ${lastSF ? `<div style="font-size:11px;color:var(--text-3);margin-bottom:10px">Última evaluación SF-12: ${fechaCorta(lastSF.aplicada_at)}</div>` : ''}
        <div style="border-top:1px solid var(--border);padding-top:12px">
          ${lastMor != null ? `
            <div style="display:flex;align-items:center;justify-content:space-between">
              <div>
                <div style="font-size:12px;font-weight:700;color:var(--text-2)">💊 Morisky-8 — Adherencia</div>
                <div style="font-size:11px;color:var(--text-3)">${fechaCorta(lastMor.aplicada_at)}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:22px;font-weight:800;color:${lastMor.clasificacion==='alta'?'var(--green)':lastMor.clasificacion==='media'?'var(--amber)':'var(--red)'}">${lastMor.puntaje??'--'}<span style="font-size:12px">/8</span></div>
                <div style="font-size:11px;color:var(--text-3)">${lastMor.clasificacion||'--'}</div>
              </div>
            </div>` : '<div class="empty">Sin evaluaciones de adherencia</div>'}
        </div>
      </div>

      <div class="card">
        <div class="card-title">🏃 Rehabilitación pulmonar</div>
        <div class="grid-2" style="gap:10px;margin-bottom:14px">
          <div class="stat-box">
            <div class="stat-num">${sesComp}</div>
            <div class="stat-label">Sesiones completadas</div>
            <div class="stat-sub">de ${sesTot} programadas</div>
          </div>
          <div class="stat-box">
            <div class="stat-num ${lastTc6m?'':'riesgo-intermedio'}">${lastTc6m?.tc6m_metros||'--'}</div>
            <div class="stat-label">TC6M (metros)</div>
            <div class="stat-sub">Normal &gt;440m</div>
          </div>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,(sesComp/sesTot)*100)}%"></div></div>
        <div style="font-size:11px;color:var(--text-3);margin-top:6px">${Math.round((sesComp/sesTot)*100)}% del programa completado</div>
        ${lastSes ? `<div style="font-size:11px;color:var(--text-3);margin-top:8px">Última sesión: ${fechaCorta(lastSes.fecha)}</div>` : ''}
      </div>

    </div>

    <!-- FILA 4: Tratamiento + Contactos enfermería + Alertas -->
    <div class="grid-3" style="margin-bottom:16px">

      <div class="card">
        <div class="card-title">💊 Tratamiento activo</div>
        ${medicamentos.length ? medicamentos.slice(0,6).map(m => `
          <div class="data-row">
            <span class="data-label">${m.medicamento||m.nombre||'Medicamento'}</span>
            <span class="data-val" style="font-size:12px">${m.dosis||''} ${m.frecuencia||''}</span>
          </div>`).join('') : '<div class="empty">Sin medicamentos registrados</div>'}
      </div>

      <div class="card">
        <div class="card-title">💉 Contactos de enfermería</div>
        ${contactos.length ? contactos.slice(0,3).map(co => {
          const cfLabel = co.cf_oms ? ['I','II','III','IV'][co.cf_oms-1] : '--';
          const morLabel = co.morisky_score!=null ? co.morisky_score+'/8' : '--';
          return `<div class="exam-item">
            <div style="display:flex;justify-content:space-between">
              <span class="exam-tipo">${co.tipo_contacto||'Contacto'}</span>
              <span class="exam-fecha">${fechaCorta(co.fecha_contacto||co.created_at)}</span>
            </div>
            <div class="exam-vals">CF-OMS ${cfLabel} · Morisky ${morLabel}
              ${co.alerta_generada?'<span style="color:var(--red);font-weight:700"> · 🚨 Alerta generada</span>':''}
            </div>
          </div>`;
        }).join('') : '<div class="empty">Sin contactos registrados</div>'}
      </div>

      <div class="card">
        <div class="card-title">🚨 Alertas activas</div>
        ${alertas.filter(a=>a.estado!=='resuelta').length ? alertas.filter(a=>a.estado!=='resuelta').slice(0,4).map(a => `
          <div class="alerta-item alerta-${a.nivel==='critica'||a.nivel==='alta'?a.nivel:'media'}">
            <span style="font-size:16px">${a.nivel==='critica'?'🔴':a.nivel==='alta'?'🟠':'🟡'}</span>
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--text-1)">${a.motivo||'Alerta'}</div>
              <div style="font-size:11px;color:var(--text-3)">${tiempoRelativo(a.created_at)}</div>
            </div>
          </div>`).join('') : '<div class="empty" style="color:var(--green)">✅ Sin alertas activas</div>'}
      </div>

    </div>`;
}

// Helpers
function dataRow(label, val) {
  return `<div class="data-row"><span class="data-label">${label}</span><span class="data-val">${val||'--'}</span></div>`;
}
function fechaCorta(iso) {
  if (!iso) return '--';
  return new Date(iso).toLocaleDateString('es-CO',{day:'numeric',month:'short',year:'numeric'});
}
function tiempoRelativo(iso) {
  if (!iso) return '';
  const diff = Math.floor((Date.now()-new Date(iso))/60000);
  if (diff<60) return `hace ${diff} min`;
  if (diff<1440) return `hace ${Math.floor(diff/60)}h`;
  return `hace ${Math.floor(diff/1440)}d`;
}
</script>
