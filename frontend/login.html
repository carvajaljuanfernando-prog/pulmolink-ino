<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PulmoLink INO — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--teal:#006B8F;--teal-dk:#00425A;--teal-pale:#E0F5FB;--warm:#F2F7FA;--white:#FFFFFF;--text-1:#0A2330;--text-2:#3A5566;--text-3:#7A9AAA;--red:#D63E3E;--green:#1A7A4A;--border:rgba(0,107,143,0.15)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito",sans-serif;background:var(--teal-dk);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--white);border-radius:20px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.25)}
.logo{text-align:center;margin-bottom:28px}
.logo-title{font-size:26px;font-weight:800;color:var(--teal-dk);letter-spacing:-0.5px}
.logo-sub{font-size:12px;color:var(--text-3);margin-top:4px}
.logo-ino{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:0.8px;text-transform:uppercase;margin-top:6px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:5px;letter-spacing:0.5px;text-transform:uppercase}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:"Nunito",sans-serif;font-size:14px;color:var(--text-1);background:var(--warm);outline:none;transition:border-color 0.15s}
.field input:focus{border-color:var(--teal);background:var(--white)}
.btn{width:100%;padding:14px;background:var(--teal);color:white;border:none;border-radius:10px;font-family:"Nunito",sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.btn:hover{background:var(--teal-dk)}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;text-align:center;margin-top:12px;display:none}
.msg.error{background:#FDF0F0;color:var(--red);display:block}
.msg.ok{background:#E8F7EF;color:var(--green);display:block}
.spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tipo-tabs{display:flex;gap:6px;margin-bottom:20px}
.tipo-tab{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:9px;font-family:"Nunito",sans-serif;font-size:12px;font-weight:600;color:var(--text-2);cursor:pointer;text-align:center;background:var(--warm);transition:all 0.15s}
.tipo-tab.active{border-color:var(--teal);background:var(--teal-pale);color:var(--teal-dk)}
.divider{height:1px;background:var(--border);margin:20px 0}
.link-paciente{text-align:center;font-size:12px;color:var(--text-3);margin-top:12px}
.link-paciente a{color:var(--teal);font-weight:600;cursor:pointer;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-title">PulmoLink</div>
    <div class="logo-sub">Plataforma de Gestión Clínica</div>
    <div class="logo-ino">Instituto Neumológico del Oriente</div>
  </div>

  <div class="tipo-tabs">
    <button class="tipo-tab active" id="tab-prof" onclick="setTipo('profesional')">Equipo clínico</button>
    <button class="tipo-tab" id="tab-pac" onclick="setTipo('paciente')">Paciente</button>
  </div>

  <div class="field">
    <label>Correo electrónico</label>
    <input type="email" id="email" placeholder="usuario@ino.com.co" onkeydown="if(event.key==='Enter') login()">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
  </div>

  <button class="btn" id="btn-login" onclick="login()">Ingresar</button>
  <div class="msg" id="msg"></div>

  <div class="link-paciente">
    <a onclick="window.location.href='/registro'">¿Nuevo paciente? Regístrate aquí</a>
  </div>
</div>

<script>
const API = 'https://pulmolink-ino-production.up.railway.app';
let tipoActual = 'profesional';

// Auto-seleccionar pestaña según parámetro URL
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('tipo') === 'paciente') {
    tipoActual = 'paciente';
    document.addEventListener('DOMContentLoaded', () => setTipo('paciente'));
  }
})();

function setTipo(tipo) {
  tipoActual = tipo;
  document.getElementById('tab-prof').classList.toggle('active', tipo === 'profesional');
  document.getElementById('tab-pac').classList.toggle('active', tipo === 'paciente');
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return mostrarMsg('Completa email y contraseña.', 'error');

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Ingresando...';

  try {
    const r = await fetch(`${API}/api/v1/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, tipo: tipoActual })
    });
    const d = await r.json();

    if (!r.ok) {
      mostrarMsg(d.error || 'Email o contraseña incorrectos.', 'error');
    } else if (d.access_token) {
      // Acceso directo — guardar token y redirigir
      if (tipoActual === 'profesional') {
        localStorage.setItem('pulmolink_token', d.access_token);
        localStorage.setItem('pulmolink_usuario', JSON.stringify(d.usuario));
      } else {
        localStorage.setItem('pulmolink_pac_token', d.access_token);
        localStorage.setItem('pulmolink_pac_usuario', JSON.stringify(d.usuario));
      }
      mostrarMsg('Acceso correcto. Redirigiendo...', 'ok');
      setTimeout(() => {
        if (tipoActual === 'profesional') {
          // Detectar rol del JWT y redirigir al dashboard correcto
          try {
            const payload = JSON.parse(atob(d.access_token.split('.')[1]));
            const rol = payload.rol || '';
            if (['coordinador','enfermeria'].includes(rol)) {
              window.location.href = '/dashboard-coordinador';
            } else {
              window.location.href = '/dashboard-profesional';
            }
          } catch(e) { window.location.href = '/dashboard-profesional'; }
        } else {
          window.location.href = '/paciente';
        }
      }, 600);
    } else if (d.mfa_requerido && d.token_mfa) {
      // Compatibilidad con cuentas antiguas que aún tienen MFA
      mostrarMsg('Esta cuenta requiere código MFA. Contacta al administrador para migrarla.', 'error');
    } else {
      mostrarMsg('Respuesta inesperada del servidor.', 'error');
    }
  } catch(e) {
    mostrarMsg('Error de conexión. Intenta de nuevo.', 'error');
  }

  btn.disabled = false;
  btn.innerHTML = 'Ingresar';
}

function mostrarMsg(txt, tipo) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'msg ' + tipo;
}
</script>
</body>
</html>
