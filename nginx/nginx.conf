# ============================================================
# PulmoLink INO — Configuración Nginx
# Reverse proxy + SSL + seguridad
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── Seguridad global ───────────────────────────────────
    server_tokens off;                          # Ocultar versión de nginx
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:;" always;

    # ── Rate limiting ──────────────────────────────────────
    # Login: máximo 10 intentos por minuto por IP
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
    # API general: 100 req/minuto por IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

    # ── Upstream: API backend ──────────────────────────────
    upstream pulmolink_api {
        server api:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS principal ────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name pulmolink.ino.com.co;

        # SSL (certificados Let's Encrypt o propios)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 5M;    # Fotos de síntomas

        # ── App del paciente ──────────────────────────────
        location / {
            root /usr/share/nginx/html/paciente;
            index index.html;
            try_files $uri $uri/ /index.html;
            expires 1h;
        }

        # ── Dashboard clínico (equipo INO) ────────────────
        location /dashboard {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /dashboard/index.html;
            # Solo acceso desde la red interna del INO
            # allow 192.168.1.0/24;   # Red interna INO (ajustar)
            # deny all;
        }

        # ── API REST ──────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://pulmolink_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }

        # ── Límite estricto en login ──────────────────────
        location /api/v1/auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://pulmolink_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health check (sin rate limit) ─────────────────
        location /health {
            proxy_pass http://pulmolink_api;
            access_log off;
        }

        # ── Bloquear acceso a archivos sensibles ──────────
        location ~ /\. {
            deny all;
        }
    }
}
